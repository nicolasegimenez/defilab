name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main # Cambia esto si tu rama principal se llama 'master'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra texlive-science

      - name: Compile LaTeX to PDF
        run: |
          cd docs
          pdflatex -interaction=nonstopmode documentacion_tecnica.tex
          pdflatex -interaction=nonstopmode documentacion_tecnica.tex # Ejecutar dos veces para referencias cruzadas

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Sube todo el repositorio (incluyendo el PDF generado)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
